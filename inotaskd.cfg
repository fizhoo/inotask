task ingest_tmp_file {
    exec = "/usr/bin/cat"
    args = [ "{full_path}" ]
}

task tmp_created {
    exec = "/usr/bin/echo"
    args = [ "TMP_CREATE", "{full_path}" ]
}

task boot_changed {
    exec = "/usr/bin/echo"
    args = [ "BOOT_EVENT", "watch={watch_path}", "entry={entry_name}", "event={event}" ]
}

rule tmp_ready {
    watch = "/tmp"
    events = [ CLOSE_WRITE ]
    exclude = [ "#*", ".*", "*.swp", "*.tmp" ]
    run = [ "ingest_tmp_file" ]
}

rule tmp_created {
    watch = "/tmp"
    events = [ CREATE ]
    exclude = [ "#*", ".*", "*.swp", "*.tmp" ]
    run = [ "tmp_created" ]
}

rule boot_changes {
    watch = "/boot"
    events = [ CLOSE_WRITE, CREATE ]
    run = [ "boot_changed" ]
}
