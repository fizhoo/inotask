task reload {
    exec = "/bin/echo"
    args = [ "reload", "fired" ]
}

rule r1 {
    watch = "/tmp"
    events = [ CREATE ]
    run = [ "reload" ]
}

rule r2 {
    watch = "/tmp"
    events = [ MODIFY ]
    run = [ "reload" ]
}
rule rk     {
watch = "/home/ayoung"
events = [MODIFY]
run = [ "reload" ]
}
